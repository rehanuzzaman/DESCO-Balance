<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DESCO Smart Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main class="container">
  <h1 class="title">⚡ DESCO Dashboard</h1>

  <section class="card">
    <h2>Balance</h2>
    <p class="balance" id="balance">Loading...</p>
    <p class="status" id="status"></p>
  </section>

  <section class="grid">
    <div class="card small">
      <h3>Days Left</h3>
      <p id="daysLeft">--</p>
    </div>
    <div class="card small">
      <h3>Daily Avg</h3>
      <p id="dailyAvg">--</p>
    </div>
  </section>

  <section class="card">
    <h2>Customer</h2>
    <p id="name"></p>
    <p id="meter"></p>
    <p id="address"></p>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
